name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      # The PHI guardrail (custom ESLint rule) runs here: an untagged PHI field
      # fails the build before anything reaches a reviewer.
      - run: npm run lint
      - run: npm run typecheck
      - name: Unit tests + 80/80/80 coverage gate
        run: npm --workspace @rxledger/api run test:cov

  integration:
    name: integration (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rxledger
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rxledger
      JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      KMS_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Apply migrations
        run: npm --workspace @rxledger/api run db:migrate
      - name: Integration suite
        run: npm --workspace @rxledger/api run test:integration

  # Placeholder for the multi-model adversarial PR review the JD describes.
  # The machine-readable gate above (lint + typecheck + coverage) is what an
  # AI reviewer's verdict would attach to; wire your agent of choice here.
  adversarial-review:
    name: ai adversarial review (gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run multi-model review here; block merge on a failing verdict."

  build:
    name: docker build
    runs-on: ubuntu-latest
    needs: [quality, integration]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile -t rxledger-api:${{ github.sha }} .
